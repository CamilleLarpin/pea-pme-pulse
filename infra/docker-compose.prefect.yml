services:
  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_UI_API_URL=http://35.241.252.5/api
    volumes:
      - prefect-db:/root/.prefect
    restart: unless-stopped

  prefect-worker:
    image: prefecthq/prefect:3-latest
    command: prefect worker start --pool pea-pme --type process
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      - prefect-server
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - /var/www/dbt-docs:/var/www/dbt-docs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - prefect-server
    restart: unless-stopped

volumes:
  prefect-db:
