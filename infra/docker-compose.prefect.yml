services:
  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_UI_API_URL=http://35.241.252.5/api
    volumes:
      - prefect-db:/root/.prefect
    restart: unless-stopped

  prefect-worker:
    image: prefecthq/prefect:3-latest
    command: prefect worker start --pool bronze-pool --type process
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      - prefect-server
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - /var/www/dbt-docs:/var/www/dbt-docs:ro
    depends_on:
      - prefect-server
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    env_file: .env.monitoring
    environment:
      - GF_INSTALL_PLUGINS=grafana-bigquery-datasource
      - GF_SERVER_ROOT_URL=http://35.241.252.5/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  prefect-db:
  grafana-data:
  prometheus-data:
