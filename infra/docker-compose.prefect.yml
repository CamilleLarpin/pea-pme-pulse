services:
  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_UI_API_URL=http://34.77.145.245/api
    volumes:
      - prefect-db:/root/.prefect
    restart: unless-stopped

  prefect-worker:
    image: prefecthq/prefect:3-latest
    command: prefect worker start --pool pea-pme --type process
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      - prefect-server
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - /var/www/dbt-docs:/var/www/dbt-docs:ro
    depends_on:
      - prefect-server
    restart: unless-stopped

  fastapi:
    image: python:3.12-slim
    working_dir: /app
    command: bash -c "pip install '.[dev]' -q && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - /home/soratobiyufo/code/Ouffo/final_project/pea-pme-pulse:/app
    network_mode: host
    restart: unless-stopped

volumes:
  prefect-db:
