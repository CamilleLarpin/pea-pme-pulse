server {
    listen 80;

    # Prefect API (no auth — used by workers and SDK)
    location /api {
        proxy_pass http://prefect-server:4200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # nao Talk To My Data (port 5005 on host)
    location /nao/ {
        proxy_pass http://host.docker.internal:5005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # dbt docs (static files)
    location /dbt-docs/ {
        alias /var/www/dbt-docs/;
        index index.html;
    }

    # FastAPI — API key protected, port 8000 on host (systemd service pea-pme-api)
    location ~ ^/(gold|overview|health|docs|openapi\.json) {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Prefect UI (basic auth)
    location / {
        auth_basic "Prefect - PEA-PME";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://prefect-server:4200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
