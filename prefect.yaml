# Prefect deployment — Bronze RSS ingestion
# Deploy: prefect deploy --all
# Worker: prefect worker start --pool bronze-pool

name: pea-pme-pulse
prefect-version: "3.6.24"

build: null
push: null

pull:
  - prefect.deployments.steps.git_clone:
      id: git_clone
      repository: https://github.com/CamilleLarpin/pea-pme-pulse.git
      branch: main
  - prefect.deployments.steps.run_shell_script:
      script: pip install -e ".[dev]"
      directory: "{{ git_clone.directory }}"

deployments:
  - name: bronze-yahoo-rss
    version: "0.1.0"
    tags: ["bronze", "rss", "yahoo"]
    description: "Bronze ingestion every 4h — Yahoo Finance FR RSS"
    entrypoint: src/flows/bronze_yahoo_rss.py:yahoo_rss_flow
    schedule:
      cron: "0 */4 * * *"
      timezone: "Europe/Paris"
    work_pool:
      name: bronze-pool
      work_queue_name: default
      job_variables:
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: "{{ prefect.blocks.secret.gcp-sa-key }}"

  - name: bronze-google-news-rss
    version: "0.1.0"
    tags: ["bronze", "rss", "google-news"]
    description: "Bronze ingestion every 4h — Google News RSS"
    entrypoint: src/flows/bronze_google_news_rss.py:google_news_rss_flow
    schedule:
      cron: "0 */4 * * *"
      timezone: "Europe/Paris"
    work_pool:
      name: bronze-pool
      work_queue_name: default
      job_variables:
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: "{{ prefect.blocks.secret.gcp-sa-key }}"

  - name: bronze-boursorama-peapme
    version: "0.1.0"
    tags: ["bronze", "boursorama", "peapme"]
    description: "Bronze ingestion every 4h — Boursorama PEA-PME"
    entrypoint: src/flows/boursorama_prefect_flow.py:boursorama_peapme_flow
    schedule:
      cron: "0 */4 * * *"
      timezone: "Europe/Paris"
    work_pool:
      name: bronze-pool
      work_queue_name: default
      job_variables:
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: "{{ prefect.blocks.secret.gcp-sa-key }}"
