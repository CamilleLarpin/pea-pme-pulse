# Prefect deployment — Bronze RSS ingestion + Silver dbt orchestration
# Deploy: prefect deploy --all
# Worker: prefect worker start --pool bronze-pool

name: pea-pme-pulse
prefect-version: "3.6.24"

build: null
push: null

pull:
  - prefect.deployments.steps.git_clone:
      id: git_clone
      repository: https://github.com/CamilleLarpin/pea-pme-pulse.git
      branch: main
  - prefect.deployments.steps.run_shell_script:
      script: pip install ".[dev]"
      directory: "{{ git_clone.directory }}"

deployments:
  - name: bronze-silver-rss
    version: "0.1.0"
    tags: ["bronze", "silver", "rss", "orchestrator"]
    description: "Bronze RSS ingestion (Yahoo + Google News) → Silver dbt refresh, every 4h"
    entrypoint: src/flows/silver_rss.py:bronze_silver_rss_flow
    schedule:
      cron: "0 */4 * * *"
      timezone: "Europe/Paris"
    work_pool:
      name: bronze-pool
      work_queue_name: default

  - name: bronze-yahoo-rss
    version: "0.1.0"
    tags: ["bronze", "rss", "yahoo"]
    description: "Bronze ingestion (manual) — Yahoo Finance FR RSS"
    entrypoint: src/flows/bronze_yahoo_rss.py:yahoo_rss_flow
    work_pool:
      name: bronze-pool
      work_queue_name: default

  - name: silver-gold-rss
    version: "0.1.0"
    tags: ["silver", "gold", "rss", "sentiment"]
    description: "Score unscored Silver RSS articles via Groq → write gold.article_sentiment → dbt gold.score_news"
    entrypoint: src/flows/gold_sentiment.py:silver_gold_rss_flow
    work_pool:
      name: bronze-pool
      work_queue_name: default
      job_variables:
        env:
          GROQ_API_KEY: "{{ prefect.blocks.secret.groq-api-key }}"

  - name: bronze-google-news-rss
    version: "0.1.0"
    tags: ["bronze", "rss", "google-news"]
    description: "Bronze ingestion (manual) — Google News RSS"
    entrypoint: src/flows/bronze_google_news_rss.py:google_news_rss_flow
    work_pool:
      name: bronze-pool
      work_queue_name: default

  - name: bronze-yfinance-ohlcv
    version: "0.1.0"
    tags: ["bronze", "ohlcv", "yfinance"]
    description: "Bronze ingestion daily at 8h Paris — yfinance OHLCV for all PEA-PME ISINs"
    entrypoint: src/flows/bronze_yfinance_ohlcv.py:yfinance_ohlcv_flow
    concurrency_limit: 1
    schedule:
      cron: "30 19 * * 1-5"
      timezone: "Europe/Paris"
    work_pool:
      name: bronze-pool
      work_queue_name: default

  - name: bronze-amf
    version: "0.1.0"
    tags: ["bronze", "amf"]
    description: "Bronze ingestion AMF"
    entrypoint: src/flows/bronze_amf_flux.py:amf_flux_flow
    schedule:
      cron: "0 */4 * * *"
      timezone: "Europe/Paris"
    work_pool:
      name: bronze-pool
      work_queue_name: default
      job_variables:
        env:
          GCP_PROJECT_ID: "bootcamp-project-pea-pme"

  - name: silver-yfinance-ohlcv
    version: "0.1.0"
    tags: ["silver", "ohlcv", "yfinance"]
    description: "Silver yfinance OHLCV — dbt clean + technical indicators. Triggered by bronze-yfinance-ohlcv on completion."
    entrypoint: src/flows/silver_yfinance_ohlcv.py:silver_yfinance_ohlcv_flow
    concurrency_limit: 1
    work_pool:
      name: bronze-pool
      work_queue_name: default
      job_variables:
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: "{{ prefect.blocks.secret.gcp-sa-key }}"

  - name: bronze-abcbourse-rss
    version: "0.1.0"
    tags: ["bronze", "rss", "abcbourse"]
    description: "Bronze ingestion every 4h — ABCBourse RSS"
    entrypoint: src/flows/bronze_abcbourse_rss.py:abcbourse_rss_flow
    schedule:
      cron: "0 8 * * 1-5"
      timezone: "Europe/Paris"
    work_pool:
      name: bronze-pool
      work_queue_name: default

  - name: bronze-silver-gold-boursorama
    version: "0.1.0"
    tags: ["bronze", "silver", "gold", "boursorama", "orchestrator"]
    description: "Boursorama PEA-PME pipeline — scrape listing → GCS → dbt Silver companies → dbt Gold companies. Monthly on 1st at 08:00 Paris."
    entrypoint: src/flows/bronze_silver_gold_boursorama.py:bronze_silver_gold_boursorama_flow
    schedule:
      cron: "0 8 1 * *"
      timezone: "Europe/Paris"
    work_pool:
      name: bronze-pool
      work_queue_name: default