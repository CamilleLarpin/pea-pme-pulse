# Prefect deployment — Bronze RSS ingestion + Silver dbt orchestration
# Deploy: prefect deploy --all
# Worker: prefect worker start --pool pea-pme

name: pea-pme-pulse
prefect-version: "3.6.24"

build: null
push: null

pull:
  - prefect.deployments.steps.git_clone:
      id: git_clone
      repository: https://github.com/Ouffo/pea-pme-pulse.git
      branch: main
  - prefect.deployments.steps.run_shell_script:
      script: flock /tmp/pip-install.lock pip install ".[dev]"
      directory: "{{ git_clone.directory }}"

deployments:
  - name: bronze-silver-rss
    version: "0.1.0"
    tags: ["bronze", "silver", "gold", "rss", "orchestrator"]
    description: "RSS pipeline (Yahoo + Google News) — Bronze → Silver dbt → Gold sentiment, every 4h"
    entrypoint: src/flows/silver_rss.py:bronze_silver_rss_flow
    schedule:
      cron: "0 */4 * * *"
      timezone: "Europe/Paris"
    work_pool:
      name: pea-pme
      work_queue_name: default
      job_variables:
        env:
          GROQ_API_KEY: "{{ prefect.blocks.secret.groq-api-key }}"

  - name: bronze-yahoo-rss
    version: "0.1.0"
    tags: ["bronze", "rss", "yahoo"]
    description: "Bronze ingestion (manual) — Yahoo Finance FR RSS"
    entrypoint: src/flows/bronze_yahoo_rss.py:yahoo_rss_flow
    work_pool:
      name: pea-pme
      work_queue_name: default

  - name: silver-gold-rss
    version: "0.1.0"
    tags: ["silver", "gold", "rss", "sentiment"]
    description: "Score unscored Silver RSS articles via Groq → write gold.article_sentiment → dbt gold.score_news"
    entrypoint: src/flows/gold_sentiment.py:silver_gold_rss_flow
    work_pool:
      name: pea-pme
      work_queue_name: default
      job_variables:
        env:
          GROQ_API_KEY: "{{ prefect.blocks.secret.groq-api-key }}"

  - name: bronze-google-news-rss
    version: "0.1.0"
    tags: ["bronze", "rss", "google-news"]
    description: "Bronze ingestion (manual) — Google News RSS"
    entrypoint: src/flows/bronze_google_news_rss.py:google_news_rss_flow
    work_pool:
      name: pea-pme
      work_queue_name: default

  - name: yfinance-ohlcv-pipeline
    version: "0.1.0"
    tags: ["bronze", "silver", "gold", "ohlcv", "yfinance", "orchestrator"]
    description: "yfinance pipeline bronze→silver→gold — OHLCV + stocks_score + company_scores. Daily weekdays 19h30 Paris."
    entrypoint: src/flows/yfinance_pipeline.py:yfinance_ohlcv_pipeline_flow
    concurrency_limit: 1
    schedule:
      cron: "30 19 * * 1-5"
      timezone: "Europe/Paris"
    work_pool:
      name: pea-pme
      work_queue_name: default

  - name: amf-pipeline
    version: "0.1.0"
    tags: ["bronze", "silver", "gold", "amf", "financial", "orchestrator"]
    description: "AMF financial pipeline - fetch API data -> extract PDF financial data -> scoring companies"
    entrypoint: src/flows/pipeline_amf.py:amf_financial_signal_pipeline_flow
    schedule:
      cron: "0 0 1 4,10 *"
      timezone: "Europe/Paris"
    work_pool:
      name: pea-pme
      work_queue_name: default
      job_variables:
        env:
          GCP_PROJECT_ID: "arched-run-488313-h2"
          GCS_BUCKET_NAME: "pea-pme-yf"
          AMF_ACTIVE_PROMPT_VERSION: "v5"
          GROQ_API_KEY: "{{ prefect.blocks.secret.groq-api-key }}"

  - name: bronze-abcbourse-rss
    version: "0.1.0"
    tags: ["bronze", "rss", "abcbourse"]
    description: "Bronze ingestion every 4h — ABCBourse RSS"
    entrypoint: src/flows/bronze_abcbourse_rss.py:abcbourse_rss_flow
    schedule:
      cron: "0 8 * * 1-5"
      timezone: "Europe/Paris"
    work_pool:
      name: pea-pme
      work_queue_name: default
      job_variables:
        env:
          GCS_SOURCE_REFERENTIEL: "referentiel/boursorama_peapme_final.csv"
          GCP_PROJECT_ID: "arched-run-488313-h2"
          GCS_BUCKET_NAME: "pea-pme-yf"
          BQ_DATASET_BRONZE: "bronze"

  - name: bronze-silver-gold-boursorama
    version: "0.1.0"
    tags: ["bronze", "silver", "gold", "boursorama", "orchestrator"]
    description: "Boursorama PEA-PME pipeline — scrape listing → GCS → dbt Silver companies → dbt Gold companies. Monthly on 1st at 08:00 Paris."
    entrypoint: src/flows/bronze_silver_gold_boursorama.py:bronze_silver_gold_boursorama_flow
    schedule:
      cron: "0 8 1 * *"
      timezone: "Europe/Paris"
    work_pool:
      name: pea-pme
      work_queue_name: default

  - name: silver-insider-signals
    version: "0.1.0"
    tags: ["silver", "amf", "insider"]
    description: "Silver amf insider signals — AI extraction from PDFs. Scheduled 1h after main pipeline."
    entrypoint: src/flows/silver_insider_parser.py:amf_insider_parser_flow
    concurrency_limit: 1
    schedule:
      cron: "0 1 1 4,10 *"
      timezone: "Europe/Paris"
    work_pool:
      name: pea-pme
      work_queue_name: default
    job_variables:
      env:
        GCP_PROJECT_ID: "bootcamp-project-pea-pme"
        BQ_DATASET_BRONZE: "bronze"
        BQ_DATASET_SILVER: "silver"
        GROQ_API_KEY: "{{ prefect.blocks.secret.groq-api-key }}"