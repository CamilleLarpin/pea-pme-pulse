# Semantic context for nao LLM Talk To My Data agent
# Scope: agent-only additions — routing keywords, example questions, query patterns.
# Business context, column definitions, and when-to-use prose live in sources.yml and gold/schema.yml.
# Do not introduce column descriptions or business context here — reference those files instead.

project:
  name: pea-pme-pulse
  universe: 571 PEA-PME eligible French SMEs (Boursorama référentiel)
  primary_key: isin
  timezone: Europe/Paris

tables:
  - name: gold.company_scores
    keywords:
      - top companies
      - best score
      - worst score
      - overall score
      - composite score
      - ranking
      - which company
      - classement
      - meilleures entreprises
      - score global
      - score composite
    example_questions:
      - "What are the top 10 companies by composite score today?"
      - "Which companies have a composite_score above 7?"
      - "What is the overall score for Thermador Groupe?"
      - "Show me the best companies across all signals"
      - "Quelles sont les 5 meilleures entreprises selon le score composite ?"
      - "Which company has the highest score_financials?"
      - "Show companies where score_insider is above 8"

  - name: gold.score_news
    keywords:
      - investment score
      - news signal
      - news score
      - media coverage
      - sentiment
      - mention count
      - actualités
    example_questions:
      - "Which company has the strongest news signal this week?"
      - "Show me companies with investment_score >= 8"
      - "Which companies have the most media coverage in the last 45 days?"
      - "What is the news score for Thermador Groupe?"

  - name: gold.article_sentiment
    keywords:
      - articles
      - news
      - why did this company score
      - sentiment reason
      - recent articles
      - what was written about
      - actualités
      - pourquoi ce score
    example_questions:
      - "Show me the 5 most recent articles about Showroomprivé"
      - "Why did this company receive a high sentiment score?"
      - "What articles drove the score for Obiz this month?"
      - "List all articles scored below 3 in the last 7 days"
      - "How many articles were scored today?"

query_patterns:
  top_n_companies: >
    SELECT name, ticker_bourso, composite_score, score_news, score_stock, score_insider, score_financials
    FROM gold.company_scores
    WHERE score_date = CURRENT_DATE('Europe/Paris')
    ORDER BY composite_score DESC
    LIMIT <n>

  company_score_lookup: >
    SELECT name, ticker_bourso, composite_score, score_news, score_stock, score_insider, score_financials, score_date
    FROM gold.company_scores
    WHERE score_date = CURRENT_DATE('Europe/Paris')
      AND (name LIKE '%<company>%' OR ticker_bourso = '<ticker>')

  news_score_lookup: >
    SELECT matched_name, investment_score, avg_sentiment_45d, mention_count_45d, score_date
    FROM gold.score_news
    WHERE matched_name LIKE '%<company>%' OR ticker_bourso = '<ticker>'

  recent_articles_for_company: >
    SELECT title, published_at, sentiment_score, sentiment_reason
    FROM gold.article_sentiment
    WHERE isin = '<isin>'
    ORDER BY published_at DESC
    LIMIT <n>

  articles_driving_score: >
    SELECT title, published_at, sentiment_score, sentiment_reason
    FROM gold.article_sentiment
    WHERE isin = '<isin>'
      AND published_at >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 45 DAY)
    ORDER BY sentiment_score DESC
