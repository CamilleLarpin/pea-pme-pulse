version: 2

# External tables dbt reads but does not build.
# Column documentation lives here alongside the source declaration.
# All column descriptions reference definitions.md via {{ doc('...') }} — do not define concepts inline.

sources:
  - name: bronze
    database: bootcamp-project-pea-pme
    schema: bronze
    tables:
      - name: yahoo_rss
        description: >
          Raw Yahoo Finance FR RSS articles matched to PEA-PME companies.
          Grain: one row per matched article per flow run — may contain duplicates across runs (deduplication happens in Silver).
          Only matched rows (isin not null) are loaded to BigQuery; unmatched are dropped after GCS dump.
          Written by Prefect flow bronze-yahoo-rss every 4h. Raw dump preserved in GCS gs://project-pea-pme/rss_yahoo/.
        columns:
          - name: title
            description: "{{ doc('title') }}"
          - name: link
            description: "{{ doc('link') }}"
          - name: published
            description: "{{ doc('published') }}"
          - name: summary
            description: "{{ doc('summary') }}"
          - name: fetched_at
            description: "{{ doc('fetched_at') }}"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: match_score
            description: "{{ doc('match_score') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"

      - name: google_news_rss
        description: >
          Raw Google News RSS articles matched to PEA-PME companies, from two feeds (euronext_growth, pme_bourse_fr).
          Grain: one row per matched article per flow run — may contain duplicates across runs (deduplication happens in Silver).
          Deduplicated by title within a single run before matching. Only matched rows (isin not null) are loaded to BigQuery.
          Written by Prefect flow bronze-google-news-rss every 4h. Raw dump preserved in GCS gs://project-pea-pme/rss_google_news/.
        columns:
          - name: feed_name
            description: "{{ doc('feed_name') }}"
          - name: title
            description: "{{ doc('title') }}"
          - name: link
            description: "{{ doc('link') }}"
          - name: published
            description: "{{ doc('published') }}"
          - name: summary
            description: "{{ doc('summary') }}"
          - name: fetched_at
            description: "{{ doc('fetched_at') }}"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: match_score
            description: "{{ doc('match_score') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"

      - name: abcbourse_news_rss
        description: >
          Raw ABCBourse news RSS articles matched to PEA-PME companies.
          Grain: one row per matched article per flow run — deduplication happens in Silver.
          Written by Prefect flow bronze-abcbourse-rss. Fields: title, link, summary (→ description), isin,
          matched_name, match_score, ticker_bourso, published (ISO datetime string), ingested_at (→ fetched_at).
        columns:
          - name: title
            description: "{{ doc('title') }}"
          - name: link
            description: "{{ doc('link') }}"
          - name: published
            description: "{{ doc('published') }}"
          - name: description
            description: "Article body text — aliased as summary in Silver"
          - name: ingested_at
            description: "Timestamp when the row was ingested — aliased as fetched_at in Silver"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: match_score
            description: "{{ doc('match_score') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"

      - name: abcbourse_analysis_rss
        description: >
          Raw ABCBourse analyst report RSS articles matched to PEA-PME companies.
          Same schema as abcbourse_news_rss.
        columns:
          - name: title
            description: "{{ doc('title') }}"
          - name: link
            description: "{{ doc('link') }}"
          - name: published
            description: "{{ doc('published') }}"
          - name: description
            description: "Article body text — aliased as summary in Silver"
          - name: ingested_at
            description: "Timestamp when the row was ingested — aliased as fetched_at in Silver"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: match_score
            description: "{{ doc('match_score') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"

      - name: amf
        description: "Raw AMF regulatory documents ingested from info-financiere.gouv.fr"

  - name: gold
    database: bootcamp-project-pea-pme
    schema: gold
    tables:
      - name: article_sentiment
        description: >
          One row per scored RSS article. Written by Prefect flow silver-gold-rss via Groq.
          Grain: one row per row_id — no duplicates (enforced by LEFT JOIN on row_id before scoring).
          Use this table for individual article signals, time series, or scoring audit.
          For aggregated per-company scores, use gold.score_news instead.
        columns:
          - name: row_id
            description: "{{ doc('row_id') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: title
            description: "{{ doc('title') }}"
          - name: published_at
            description: "{{ doc('published_at') }}"
          - name: sentiment_score
            description: "{{ doc('sentiment_score') }}"
          - name: sentiment_reason
            description: "{{ doc('sentiment_reason') }}"
          - name: groq_model
            description: "{{ doc('groq_model') }}"
          - name: scored_at
            description: "{{ doc('scored_at') }}"
