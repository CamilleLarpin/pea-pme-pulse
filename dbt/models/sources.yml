version: 2

# External tables dbt reads but does not build.
# Column documentation lives here alongside the source declaration.
# All column descriptions reference definitions.md via {{ doc('...') }} — do not define concepts inline.

sources:
  - name: work
    database: bootcamp-project-pea-pme
    schema: work
    tables:
      - name: amf_financial_signal_staging
        description: "Raw staging table populated by the AMF financial signal extraction pipeline."
        columns:
          - name: record_id
            description: "Unique AMF document identifier."
          - name: extraction_status
            description: "Technical extraction status from the pipeline."
          - name: financial_signal_run_id
            description: "Run id of the silver extraction pipeline."
          - name: extracted_at
            description: "Timestamp when the extraction row was produced."

  - name: bronze
    database: bootcamp-project-pea-pme
    schema: bronze
    tables:
      - name: yahoo_rss
        description: >
          Raw Yahoo Finance FR RSS articles matched to PEA-PME companies.
          Grain: one row per matched article per flow run — may contain duplicates across runs (deduplication happens in Silver).
          Only matched rows (isin not null) are loaded to BigQuery; unmatched are dropped after GCS dump.
          Written by Prefect flow bronze-yahoo-rss every 4h. Raw dump preserved in GCS gs://project-pea-pme/rss_yahoo/.
        columns:
          - name: title
            description: "{{ doc('title') }}"
          - name: link
            description: "{{ doc('link') }}"
          - name: published
            description: "{{ doc('published') }}"
          - name: summary
            description: "{{ doc('summary') }}"
          - name: fetched_at
            description: "{{ doc('fetched_at') }}"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: match_score
            description: "{{ doc('match_score') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"

      - name: google_news_rss
        description: >
          Raw Google News RSS articles matched to PEA-PME companies, from two feeds (euronext_growth, pme_bourse_fr).
          Grain: one row per matched article per flow run — may contain duplicates across runs (deduplication happens in Silver).
          Deduplicated by title within a single run before matching. Only matched rows (isin not null) are loaded to BigQuery.
          Written by Prefect flow bronze-google-news-rss every 4h. Raw dump preserved in GCS gs://project-pea-pme/rss_google_news/.
        columns:
          - name: feed_name
            description: "{{ doc('feed_name') }}"
          - name: title
            description: "{{ doc('title') }}"
          - name: link
            description: "{{ doc('link') }}"
          - name: published
            description: "{{ doc('published') }}"
          - name: summary
            description: "{{ doc('summary') }}"
          - name: fetched_at
            description: "{{ doc('fetched_at') }}"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: match_score
            description: "{{ doc('match_score') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"

      - name: abcbourse_news_rss
        description: >
          Raw ABCBourse news RSS articles matched to PEA-PME companies.
          Grain: one row per matched article per flow run — deduplication happens in Silver.
          Written by Prefect flow bronze-abcbourse-rss. Fields: title, link, summary (→ description), isin,
          matched_name, match_score, ticker_bourso, published (ISO datetime string), ingested_at (→ fetched_at).
        columns:
          - name: title
            description: "{{ doc('title') }}"
          - name: link
            description: "{{ doc('link') }}"
          - name: published
            description: "{{ doc('published') }}"
          - name: description
            description: "Article body text — aliased as summary in Silver"
          - name: ingested_at
            description: "Timestamp when the row was ingested — aliased as fetched_at in Silver"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: match_score
            description: "{{ doc('match_score') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"

      - name: abcbourse_analysis_rss
        description: >
          Raw ABCBourse analyst report RSS articles matched to PEA-PME companies.
          Same schema as abcbourse_news_rss.
        columns:
          - name: title
            description: "{{ doc('title') }}"
          - name: link
            description: "{{ doc('link') }}"
          - name: published
            description: "{{ doc('published') }}"
          - name: description
            description: "Article body text — aliased as summary in Silver"
          - name: ingested_at
            description: "Timestamp when the row was ingested — aliased as fetched_at in Silver"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: match_score
            description: "{{ doc('match_score') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"

      - name: boursorama
        description: >
          PEA-PME company referentiel scraped from Boursorama — 571 companies.
          External table backed by gs://project-pea-pme/boursorama_peapme_final.csv.
          Grain: one row per company (current snapshot). Refreshed monthly by Prefect flow bronze-boursorama.
          Also used as the local referentiel CSV for fuzzy matching in all Bronze flows.
        columns:
          - name: name
            description: "{{ doc('matched_name') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: detail_url
            description: "Boursorama company detail page URL"
          - name: last
            description: "Last traded price at time of scrape"
          - name: variation
            description: "Daily price variation (%) at time of scrape"
          - name: high
            description: "Day high price at time of scrape"
          - name: low
            description: "Day low price at time of scrape"
          - name: volume
            description: "Traded volume at time of scrape (often null)"
          - name: raw_data_ist_init
            description: "Raw JSON market data blob from Boursorama data-ist-init attribute"
          - name: ingested_at
            description: "{{ doc('fetched_at') }}"


      - name: yfinance_ohlcv
        description: >
          Raw daily OHLCV data from Yahoo Finance — all PEA-PME ISINs.
          Grain: one row per (isin, Date). Written by Prefect flow bronze-yfinance-ohlcv
          every weekday at 19h30 Paris. Idempotent: existing rows are skipped (date-based check).
        columns:
          - name: isin
            description: "{{ doc('isin') }}"
            tests:
              - not_null
          - name: Date
            description: "{{ doc('date_cotation') }}"
            tests:
              - not_null
          - name: Close
            description: "{{ doc('close_price') }}"
            tests:
              - not_null
          - name: yf_ticker
            description: "{{ doc('yf_ticker') }}"
          - name: ingested_at
            description: "{{ doc('fetched_at') }}"

  - name: silver
    database: bootcamp-project-pea-pme
    schema: silver
    tables:
      - name: yahoo_ohlcv
        description: >
          OHLCV data + technical indicators for all PEA-PME ISINs.
          Written by compute_silver.py from silver.yahoo_ohlcv_clean.
          Grain: one row per (isin, Date). Not a dbt model — managed externally by Python pipeline.
        columns:
          - name: isin
            description: "{{ doc('isin') }}"
            tests:
              - not_null
          - name: Date
            description: "{{ doc('date_cotation') }}"
            tests:
              - not_null
          - name: Close
            description: "{{ doc('close_price') }}"
            tests:
              - not_null
          - name: yf_ticker
            description: "{{ doc('yf_ticker') }}"
          - name: RSI_14
            description: "{{ doc('RSI_14') }}"
          - name: MACD
            description: "{{ doc('MACD') }}"
          - name: MACD_signal
            description: "{{ doc('MACD_signal') }}"
          - name: BB_upper
            description: "{{ doc('BB_upper') }}"
          - name: BB_lower
            description: "{{ doc('BB_lower') }}"
          - name: SMA_50
            description: "{{ doc('SMA_50') }}"
          - name: SMA_200
            description: "{{ doc('SMA_200') }}"
          - name: EMA_20
            description: "{{ doc('EMA_20') }}"
          - name: computed_at
            description: "{{ doc('computed_at') }}"
          - name: Open
            description: "Prix d'ouverture de la séance (EUR)"
          - name: High
            description: "Plus haut de la séance (EUR)"
          - name: Low
            description: "Plus bas de la séance (EUR)"
          - name: Volume
            description: "Volume échangé sur la séance (nombre de titres)"

      - name: amf_insider_signals
        description: >
          Data extracted from AMF (Autorité des Marchés Financiers) PDF filings using Large Language Models (Groq Llama 3.1).
          This is an external source table populated by the Python orchestration pipeline, not a dbt-managed model.
        columns:
          - name: isin
            description: "{{ doc('isin') }}"
            tests:
              - not_null
          - name: societe
            description: "The legal name of the issuing company, normalized from the Bronze layer metadata."
          - name: ticker
            description: "Stock market ticker symbol (e.g., ALNOV). Defaults to ISIN if the symbol is not explicitly found in the document."
          - name: dirigeant
            description: "Full name of the individual (insider) who performed the transaction."
          - name: qualite
            description: "The professional role or position of the insider (e.g., CEO, Board Member, or Closely Associated Person)."
          - name: type_operation
            description: "The nature of the transaction, such as 'Achat' (Purchase), 'Vente' (Sale), or 'Nomination'."
          - name: montant
            description: "Total monetary value of the transaction in EUR, extracted or calculated by the LLM."
          - name: date_signal
            description: "The specific date when the transaction took place, as declared in the filing."
          - name: source_record_id
            description: "Unique hash derived from the Bronze layer. Ensures idempotency by preventing duplicate processing of the same PDF."
            tests:
              - unique
              - not_null
          - name: url_doc
            description: "Direct URL to the original source PDF document for auditability and verification."
          - name: extraction_method
            description: "Identifies the LLM model and parsing logic version (e.g., groq-llama-3.1-8b) used for the extraction."
          - name: processed_at
            description: "UTC timestamp indicating when the record was processed and inserted into the Silver layer."
  - name: gold
    database: bootcamp-project-pea-pme
    schema: gold
    tables:
      - name: article_sentiment
        description: >
          One row per scored RSS article. Written by Prefect flow silver-gold-rss via Groq.
          Grain: one row per row_id — no duplicates (enforced by LEFT JOIN on row_id before scoring).
          Use this table for individual article signals, time series, or scoring audit.
          For aggregated per-company scores, use gold.score_news instead.
        columns:
          - name: row_id
            description: "{{ doc('row_id') }}"
          - name: isin
            description: "{{ doc('isin') }}"
          - name: ticker_bourso
            description: "{{ doc('ticker_bourso') }}"
          - name: matched_name
            description: "{{ doc('matched_name') }}"
          - name: title
            description: "{{ doc('title') }}"
          - name: published_at
            description: "{{ doc('published_at') }}"
          - name: sentiment_score
            description: "{{ doc('sentiment_score') }}"
          - name: sentiment_reason
            description: "{{ doc('sentiment_reason') }}"
          - name: groq_model
            description: "{{ doc('groq_model') }}"
          - name: scored_at
            description: "{{ doc('scored_at') }}"
