version: 2

models:
  - name: stocks_score
    description: >
      Daily technical score per PEA-PME company — one row per (ISIN, date), full history rebuilt on every pipeline run.
      Grain: one row per (isin, date). is_latest=TRUE marks the most recent trading date per ISIN.
      Methodology: 5 technical signals (RSI, MACD, Golden Cross, Bollinger Bands, EMA trend) × 0/1/2 pts → score_technique ∈ [0, 10].
      NaN policy: indicator unavailable (warmup < required periods) → neutral score (+1), no penalty.
      Use score_technique for point-in-time ranking, score_7d_avg for smoothed trend, is_latest to filter the current snapshot.
    columns:
      - name: isin
        description: "{{ doc('isin') }}"
        tests:
          - not_null
      - name: yf_ticker
        description: "{{ doc('yf_ticker') }}"
      - name: date
        description: "{{ doc('date_cotation') }}"
        tests:
          - not_null
      - name: Close
        description: "{{ doc('close_price') }}"
        tests:
          - not_null
      - name: rsi_signal
        description: "{{ doc('rsi_signal') }}"
        tests:
          - not_null
      - name: macd_signal
        description: "{{ doc('macd_signal') }}"
        tests:
          - not_null
      - name: golden_cross_signal
        description: "{{ doc('golden_cross_signal') }}"
        tests:
          - not_null
      - name: bollinger_signal
        description: "{{ doc('bollinger_signal') }}"
        tests:
          - not_null
      - name: trend_signal
        description: "{{ doc('trend_signal') }}"
        tests:
          - not_null
      - name: score_technique
        description: "{{ doc('score_technique') }}"
        tests:
          - not_null
      - name: score_7d_avg
        description: "{{ doc('score_7d_avg') }}"
        tests:
          - not_null
      - name: is_latest
        description: "{{ doc('is_latest') }}"
        tests:
          - not_null

  - name: score_news
    description: >
      Daily investment news score per PEA-PME company — one row per ISIN, rebuilt on every pipeline run.
      Grain: one row per ISIN (current snapshot, not historical).
      Methodology: 45-day rolling average of article sentiment_score, normalized via PERCENT_RANK to a 1–10 scale.
      Use this table to rank companies by news signal strength, identify top movers, or feed a composite scoring model.
      Do not use for historical trend analysis — this table holds the current snapshot only; use gold.article_sentiment for time series.
    columns:
      - name: isin
        description: "{{ doc('isin') }}"
        tests:
          - not_null
          - unique
      - name: ticker_bourso
        description: "{{ doc('ticker_bourso') }}"
      - name: matched_name
        description: "{{ doc('matched_name') }}"
      - name: mention_count_45d
        description: "{{ doc('mention_count_45d') }}"
        tests:
          - not_null
      - name: avg_sentiment_45d
        description: "{{ doc('avg_sentiment_45d') }}"
        tests:
          - not_null
      - name: investment_score
        description: "{{ doc('investment_score') }}"
        tests:
          - not_null
      - name: score_date
        description: "{{ doc('score_date') }}"
        tests:
          - not_null
