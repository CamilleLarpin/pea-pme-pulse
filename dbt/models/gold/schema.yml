version: 2

models:
  - name: stocks_score
    description: >
      Daily technical score per PEA-PME company — one row per (ISIN, date), full history rebuilt on every pipeline run.
      Grain: one row per (isin, date). is_latest=TRUE marks the most recent trading date per ISIN.
      Methodology: 5 technical signals (RSI, MACD, Golden Cross, Bollinger Bands, EMA trend) × 0/1/2 pts → score_technique ∈ [0, 10].
      NaN policy: indicator unavailable (warmup < required periods) → neutral score (+1), no penalty.
      Use score_technique for point-in-time ranking, score_7d_avg for smoothed trend, is_latest to filter the current snapshot.
    columns:
      - name: isin
        description: "{{ doc('isin') }}"
        tests:
          - not_null
      - name: yf_ticker
        description: "{{ doc('yf_ticker') }}"
      - name: date
        description: "{{ doc('date_cotation') }}"
        tests:
          - not_null
      - name: Close
        description: "{{ doc('close_price') }}"
        tests:
          - not_null
      - name: rsi_signal
        description: "{{ doc('rsi_signal') }}"
        tests:
          - not_null
      - name: macd_signal
        description: "{{ doc('macd_signal') }}"
        tests:
          - not_null
      - name: golden_cross_signal
        description: "{{ doc('golden_cross_signal') }}"
        tests:
          - not_null
      - name: bollinger_signal
        description: "{{ doc('bollinger_signal') }}"
        tests:
          - not_null
      - name: trend_signal
        description: "{{ doc('trend_signal') }}"
        tests:
          - not_null
      - name: score_technique
        description: "{{ doc('score_technique') }}"
        tests:
          - not_null
      - name: score_7d_avg
        description: "{{ doc('score_7d_avg') }}"
        tests:
          - not_null
      - name: is_latest
        description: "{{ doc('is_latest') }}"
        tests:
          - not_null

  - name: company_scores
    description: >
      Enriched PEA-PME company list — one row per ISIN, rebuilt on every monthly pipeline run.
      Grain: one row per ISIN. Left join: all 571 companies appear; score columns null when no articles exist yet.
      Combines the latest silver.companies snapshot (name, ticker) with the current gold.score_news signal.
      Use for company ranking, nao Talk To My Data, or composite scoring.
    columns:
      - name: isin
        description: "{{ doc('isin') }}"
        tests:
          - not_null
          - unique
      - name: name
        description: "{{ doc('matched_name') }}"
        tests:
          - not_null
      - name: ticker_bourso
        description: "{{ doc('ticker_bourso') }}"
        tests:
          - not_null
      - name: snapshot_date
        description: "Date of the latest silver.companies snapshot used"
        tests:
          - not_null
      - name: investment_score
        description: "{{ doc('investment_score') }}"
      - name: mention_count_45d
        description: "{{ doc('mention_count_45d') }}"
      - name: avg_sentiment_45d
        description: "{{ doc('avg_sentiment_45d') }}"
      - name: score_date
        description: "{{ doc('score_date') }}"

  - name: score_news
    description: >
      Daily investment news score per PEA-PME company — one row per ISIN, rebuilt on every pipeline run.
      Grain: one row per ISIN (current snapshot, not historical).
      Methodology: 45-day rolling average of article sentiment_score, normalized via PERCENT_RANK to a 1–10 scale.
      Use this table to rank companies by news signal strength, identify top movers, or feed a composite scoring model.
      Do not use for historical trend analysis — this table holds the current snapshot only; use gold.article_sentiment for time series.
    columns:
      - name: isin
        description: "{{ doc('isin') }}"
        tests:
          - not_null
          - unique
      - name: ticker_bourso
        description: "{{ doc('ticker_bourso') }}"
      - name: matched_name
        description: "{{ doc('matched_name') }}"
      - name: mention_count_45d
        description: "{{ doc('mention_count_45d') }}"
        tests:
          - not_null
      - name: avg_sentiment_45d
        description: "{{ doc('avg_sentiment_45d') }}"
        tests:
          - not_null
      - name: investment_score
        description: "{{ doc('investment_score') }}"
        tests:
          - not_null
      - name: score_date
        description: "{{ doc('score_date') }}"
        tests:
          - not_null
          
  - name: score_insider
    description: >
      Gold layer model computing a normalized Investment Score (1–10) based on AMF insider trading signals.
      It aggregates individual trades into daily company snapshots.
    columns:
      - name: isin
        description: "{{ doc('isin') }}"
        tests:
          - not_null
          - unique
      - name: societe
        description: "Canonical company name from the referential."
      - name: signal_date
        description: "The disclosure date of the trade, used as the timeline anchor."
        tests:
          - not_null
      - name: insider_names
        description: "List of the specific insiders (CEOs, Directors, etc.) who performed the trades."
      - name: num_operations
        description: "Total number of distinct transaction records reported for this company on this date."
      - name: total_amount
        description: "Aggregated monetary value (EUR) of all insider transactions for this snapshot."
      - name: raw_score
        description: "Pre-normalized score calculated as log10(volume) multiplied by the cluster bonus."
      - name: score_1_10
        description: "Final normalized 1-10 conviction score. 10 indicates high-volume/high-conviction buying."
        tests:
          - not_null

  - name: financials_score
    description: >
      Fundamental financial score per PEA-PME company — one row per (ticker, date_cloture_exercice).
      Grain: one row per (ticker, date_cloture_exercice). Updated semi-annually or annually as new financial
      documents are extracted from AMF filings.
      Methodology: Z-score pondéré sur 4 métriques fondamentales → score_fondamental ∈ [0, 10].
        - ca_growth    (25%) : croissance du chiffre d'affaires
        - marge_op     (30%) : marge opérationnelle
        - levier       (25%) : dette nette / EBITDA (inversé — moins de levier = meilleur score)
        - fcf_yield    (20%) : FCF / CA (proxy rendement cash)
      Winsorisation à 5%/95% par métrique pour limiter l'effet outliers.
      Pondération dynamique : les poids sont redistribués sur les métriques disponibles.
      Éligibilité : au moins 2 métriques disponibles sur 4 (nb_metrics >= 2).
      coverage_score ∈ [0, 1] : somme des poids effectifs — indique la fiabilité du score.
      Use score_fondamental for fundamental ranking, coverage_score to filter low-confidence scores.
    columns:
      - name: ticker
        description: "{{ doc('ticker_bourso') }}"
        tests:
          - not_null
      - name: date_cloture_exercice
        description: "Date de clôture de l'exercice comptable (annuel ou semestriel) au format DATE."
        tests:
          - not_null
      - name: score_fondamental
        description: >
          Score fondamental normalisé entre 0 et 10 via PERCENT_RANK sur le Z-score composite pondéré.
          10 = meilleur profil fondamental dans la population courante.
          0 = profil le plus dégradé. Score relatif à la population PEA-PME disponible à date d'extraction.
        tests:
          - not_null
      - name: ca_growth_pct
        description: "Croissance du chiffre d'affaires en % (valeur brute extraite du document AMF, avant winsorisation)."
      - name: marge_op_pct
        description: "Marge opérationnelle en % (valeur brute extraite du document AMF, avant winsorisation)."
      - name: levier_dette_ebitda
        description: "Ratio dette nette / EBITDA (dérivé des métriques silver). Null si EBITDA <= 0 ou manquant."
      - name: fcf_yield_pct
        description: "Free Cash Flow / CA en % (dérivé des métriques silver). Null si CA <= 0 ou manquant."
      - name: z_ca_growth
        description: "Z-score de ca_growth (après winsorisation). Null si métrique indisponible."
      - name: z_marge_op
        description: "Z-score de marge_op (après winsorisation). Null si métrique indisponible."
      - name: z_levier
        description: "Z-score du levier, inversé (−z) : un levier faible donne un z_levier positif. Null si métrique indisponible."
      - name: z_fcf_yield
        description: "Z-score du fcf_yield (après winsorisation). Null si métrique indisponible."
      - name: z_composite
        description: "Score composite = moyenne pondérée normalisée des Z-scores disponibles. Base du classement PERCENT_RANK."
      - name: nb_metrics
        description: "Nombre de métriques disponibles sur 4 pour ce ticker/période. Minimum requis : 2."
        tests:
          - not_null
      - name: coverage_score
        description: >
          Somme des poids effectifs ∈ [0, 1]. Indique la fiabilité du score fondamental.
          1.0 = les 4 métriques sont disponibles. < 0.5 = score basé sur peu de données, à interpréter avec prudence.
        tests:
          - not_null
      - name: source
        description: "Source du document financier (ex: amf)."
      - name: financial_signal_run_id
        description: "Identifiant du run d'extraction LLM ayant produit les métriques sources."
      - name: extracted_at
        description: "Timestamp d'extraction LLM des métriques financières sources (UTC)."
      - name: scored_at
        description: "Timestamp de calcul du score fondamental (UTC)."
