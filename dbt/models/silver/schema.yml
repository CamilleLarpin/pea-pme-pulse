version: 2

models:
  - name: yahoo_ohlcv_clean
    description: >
      Clean daily OHLCV data for all PEA-PME ISINs — deduplicated, validated, enriched with last_trading_date.
      Grain: one row per (isin, Date). Built incrementally from bronze.yfinance_ohlcv.
      Used as input for compute_silver.py (technical indicators).
    columns:
      - name: isin
        description: "{{ doc('isin') }}"
        tests:
          - not_null
      - name: Date
        description: "{{ doc('date_cotation') }}"
        tests:
          - not_null
      - name: Close
        description: "{{ doc('close_price') }}"
        tests:
          - not_null
      - name: Open
        description: "Prix d'ouverture de la séance (EUR)"
        tests:
          - not_null
      - name: High
        description: "Plus haut de la séance (EUR)"
      - name: Low
        description: "Plus bas de la séance (EUR)"
      - name: Volume
        description: "Volume échangé sur la séance"
      - name: yf_ticker
        description: "{{ doc('yf_ticker') }}"
      - name: last_trading_date
        description: "{{ doc('last_trading_date') }}"
        tests:
          - not_null

  - name: rss_articles
    description: >
      Unified silver RSS articles from all sources (Yahoo Finance FR, Google News).
      Deduplicated by (title, isin). Only company-matched rows (isin not null).
    columns:
      - name: row_id
        description: "Surrogate key: hex(md5(lower(title) || '|' || isin)) — stable dedup key"
        tests:
          - not_null
          - unique
      - name: isin
        description: "ISIN of the matched PEA-PME company"
        tests:
          - not_null
      - name: title
        description: "Article title (original, not cleaned)"
        tests:
          - not_null
      - name: source
        description: "Origin RSS feed: yahoo_rss | google_news_rss"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['yahoo_rss', 'google_news_rss', 'abcbourse_rss']
      - name: published_at
        description: "Parsed publish timestamp (UTC) — null if unparseable"
      - name: matched_name
        description: "Company name from referentiel that was fuzzy-matched"
      - name: match_score
        description: "Fuzzy match confidence score (0–100)"
      - name: ticker_bourso
        description: "Boursorama ticker of the matched company"

  - name: companies
    description: >
      PEA-PME company referentiel — historised monthly snapshot from bronze.boursorama.
      Grain: one row per (isin, snapshot_date). Each monthly pipeline run adds a new snapshot.
      Use the latest snapshot_date to get the current referentiel.
    columns:
      - name: isin
        description: "{{ doc('isin') }}"
        tests:
          - not_null
      - name: name
        description: "{{ doc('matched_name') }}"
        tests:
          - not_null
      - name: ticker_bourso
        description: "{{ doc('ticker_bourso') }}"
        tests:
          - not_null
      - name: snapshot_date
        description: "Date this row was captured — one snapshot per monthly pipeline run"
        tests:
          - not_null

  - name: amf_financial_signal
    description: "Silver table containing deduplicated financial signals extracted from AMF PDFs."
    columns:
      - name: record_id
        description: "Unique AMF document identifier."
        tests:
          - not_null
          - unique

      - name: isin
        description: "ISIN of the issuer."

      - name: ticker
        description: "Ticker if available."

      - name: source_url
        description: "Original AMF PDF URL."

      - name: pdf_gcs_uri
        description: "GCS URI of the downloaded PDF."

      - name: document_publication_ts
        description: "Publication timestamp of the AMF document."

      - name: date_cloture_exercice
        description: "Reporting period end date extracted from the document."

      - name: ca
        description: "Revenue normalized in EUR."

      - name: ca_growth
        description: "Revenue growth percentage as numeric percentage value."
        tests:
          - dbt_utils.accepted_range:
              min_value: -1000
              max_value: 10000
              config:
                severity: warn

      - name: ebitda
        description: "EBITDA normalized in EUR."

      - name: marge_op
        description: "Operating margin percentage as numeric percentage value."
        tests:
          - dbt_utils.accepted_range:
              min_value: -1000
              max_value: 10000
              config:
                severity: warn

      - name: dette_nette
        description: "Net debt normalized in EUR."

      - name: fcf
        description: "Free cash flow normalized in EUR."

      - name: parser_used
        description: "Parser used for PDF text extraction."

      - name: llm_model
        description: "LLM model used for extraction."

      - name: llm_prompt_version
        description: "Prompt version used for extraction."

      - name: source
        description: "Source system identifier."

      - name: source_run_id
        description: "Bronze ingestion run id."

      - name: financial_signal_run_id
        description: "Silver extraction run id."
        tests:
          - not_null

      - name: extracted_at
        description: "Timestamp when extraction row was produced."
        tests:
          - not_null

      - name: loaded_at
        description: "Timestamp when the silver model was built."
        tests:
          - not_null

      - name: llm_prompt_version_num
        description: "Version numérique extraite de llm_prompt_version pour permettre un tri correct entre v1, v2, v10, etc."