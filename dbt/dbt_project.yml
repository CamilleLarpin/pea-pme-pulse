name: pea_pme_pulse
version: '1.0.0'
config-version: 2

profile: pea_pme_pulse

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  insider_weights:
    achat_base_score: 100
    vente_base_score: -50
    cluster_bonus_weight: 0.5
    max_log_amount: 6

models:
  pea_pme_pulse:
    silver:
      +materialized: table
      +schema: silver
    gold:
      +materialized: table
      +schema: gold
